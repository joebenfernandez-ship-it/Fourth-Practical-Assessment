<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top-header">
    <h1>Contact Us</h1>
</header>

<form id="myForm" style="width:300px; margin:auto;">

    <input type="text" id="name" placeholder="Name">
    <input type="number" id="age" placeholder="Age" min="1">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="cellphone" placeholder="Cellphone">
    <textarea id="note" placeholder="Write your note or message here..."></textarea>

    <button type="submit">Submit</button>

    <p id="message"></p>
</form>

<div class="contact-note">
    <p>
        Note: Please make sure all information you provide is accurate.
        We will respond to your inquiry as soon as possible. Thank you!
    </p>
</div>

<script src="script.js"></script>

</body>
</html>
